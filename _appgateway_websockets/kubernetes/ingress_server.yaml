apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: websocket-echo-server
  annotations:
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/connection-draining-timeout: "30" # default to 30s
    appgw.ingress.kubernetes.io/request-timeout: "120" # default to 30s
    appgw.ingress.kubernetes.io/health-probe-path: "/health"
    appgw.ingress.kubernetes.io/cookie-based-affinity: "false" # default to false
spec:
  ingressClassName: azure-application-gateway
  rules:
  - http:
      paths:
      - path: /websocket-echo-server
        pathType: Prefix
        backend:
          service:
            name: websocket-echo-server
            port:
              number: 80

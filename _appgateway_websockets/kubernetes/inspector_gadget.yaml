apiVersion: apps/v1
kind: Deployment
metadata:
  name: inspectorgadget
  labels:
    app: inspectorgadget
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inspectorgadget
  template:
    metadata:
      labels:
        app: inspectorgadget
    spec:
      containers:
      - name: inspectorgadget
        image: ghcr.io/jelledruyts/inspectorgadget:latest
        ports:
        - containerPort: 80
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: inspectorgadget
spec:
  selector:
    app: inspectorgadget
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: inspectorgadget
  annotations:
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    appgw.ingress.kubernetes.io/connection-draining: "true"
    appgw.ingress.kubernetes.io/health-probe-path: "/"
    appgw.ingress.kubernetes.io/backend-path-prefix: "/" # Optional because we're using PathBase in the app settings
spec:
  ingressClassName: azure-application-gateway
  rules:
  - http:
      paths:
      - path: /inspectorgadget/
        pathType: Prefix # Exact
        backend:
          service:
            name: inspectorgadget
            port:
              number: 80
      - path: /inspectorgadget/* # Need to include "*" for wildcard match in AppGateway
        pathType: Prefix # Exact
        backend:
          service:
            name: inspectorgadget
            port:
              number: 80
# # Kubernetes equivalent of the Azure Container App "qwen-3-6-35b-a100"
# # ACA mappings:
# #   - azurerm_container_app                -> Deployment + Service
# #   - ingress (external, target_port 8000) -> Service type LoadBalancer on port 8000
# #   - startup/liveness/readiness_probe     -> container probes
# #   - workload_profile GPU-NC24-A100       -> nodeSelector "apps=gpu" + nvidia.com/gpu limit + spot toleration
# #   - min_replicas 0 / max_replicas 1      -> KEDA ScaledObject (scale-to-zero)
# #   - http_scale_rule concurrent_requests  -> KEDA http-add-on ScaledObject (requestRate/2)
# #   - polling_interval 30 / cooldown 1800  -> ScaledObject pollingInterval / cooldownPeriod
# #   - volume storage-llm (NfsAzureFile)    -> PersistentVolumeClaim (azurefile-csi-nfs) + volumeMount
# ---

# Kubernetes equivalent of the Azure Container App "gemma-4-31b-it-a100"
# ACA mappings:
#   - azurerm_container_app                -> Deployment + Service
#   - ingress (external, target_port 8000) -> Service type LoadBalancer on port 8000
#   - startup/liveness/readiness_probe     -> container probes
#   - workload_profile GPU-NC24-A100       -> nodeSelector "apps=gpu" + nvidia.com/gpu limit + spot toleration
#   - min_replicas 0 / max_replicas 1      -> KEDA ScaledObject (scale-to-zero)
#   - http_scale_rule concurrent_requests  -> KEDA http-add-on ScaledObject (requestRate/2)
#   - polling_interval 30 / cooldown 1800  -> ScaledObject pollingInterval / cooldownPeriod
---
apiVersion: v1
kind: Namespace
metadata:
  name: gemma4
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gemma-4-31b-it-a100
  namespace: gemma4
  labels:
    app: gemma-4-31b-it-a100
spec:
  # min_replicas = 0 / max_replicas = 1 are driven by the KEDA ScaledObject below.
  # Start at 1 so the model is reachable; KEDA takes over ownership afterwards.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gemma-4-31b-it-a100
  template:
    metadata:
      labels:
        app: gemma-4-31b-it-a100
    spec:
      terminationGracePeriodSeconds: 30
      # Schedule onto the A100 GPU node pool (node_labels "apps=gpu")
      nodeSelector:
        apps: gpu
      # Tolerate the GPU spot node pool taint
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: kubernetes.azure.com/scalesetpriority
          operator: Equal
          value: spot
          effect: NoSchedule
      containers:
        - name: gemma4-31b-it
          image: vllm/vllm-openai:gemma4-cu130
          # src: https://docs.vllm.ai/projects/recipes/en/latest/Google/Gemma4.html#pip-nvidia-cuda
          args:
            - "--model"
            - "google/gemma-4-31B-it"
            - "--tensor-parallel-size"
            - "1"
            - "--max-model-len"
            - "32768"
            - "--gpu-memory-utilization"
            - "0.85"
            - "--limit-mm-per-prompt"
            - '{"images":4,"videos":1,"audios":1}'
            - "--enable-auto-tool-choice"
            - "--tool-call-parser"
            - "gemma4"
            - "--reasoning-parser"
            - "gemma4"
            - "--chat-template"
            - "examples/tool_chat_template_gemma4.jinja"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              cpu: "8"
              memory: 24Gi
              nvidia.com/gpu: 1
            limits:
              cpu: "8"
              memory: 24Gi
              nvidia.com/gpu: 1 # GPU-NC24-A100 workload profile
          # startup_probe
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 240
            timeoutSeconds: 240
            failureThreshold: 4
          # liveness_probe
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 240
            timeoutSeconds: 240
            failureThreshold: 4
          # readiness_probe
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 240
            timeoutSeconds: 240
            failureThreshold: 4
          # Optional: HF token if needed for gated models
          # env:
          #   - name: HF_TOKEN
          #     valueFrom:
          #       secretKeyRef:
          #         name: hf-token
          #         key: token
---
# ingress { external_enabled = true, target_port = 8000, allow_insecure_connections = true }
apiVersion: v1
kind: Service
metadata:
  name: gemma-4-31b-it-a100
  namespace: gemma4
  labels:
    app: gemma-4-31b-it-a100
spec:
  type: LoadBalancer
  selector:
    app: gemma-4-31b-it-a100
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
---
# template { min_replicas = 0, max_replicas = 1, polling_interval = 30, cooldown = 1800 }
